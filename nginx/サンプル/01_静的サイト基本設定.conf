# ============================================================
# nginx サンプル01：静的サイトの基本設定
# ============================================================
#
# 学べる内容:
#   - server ブロックの基本構成
#   - root と index ディレクティブ
#   - 静的ファイルのキャッシュ設定
#   - favicon / robots.txt のログ抑制
#
# 使い方:
#   1. このファイルを /etc/nginx/sites-available/ にコピー
#   2. sites-enabled にシンボリックリンクを作成
#      ln -s /etc/nginx/sites-available/01_静的サイト基本設定.conf \
#             /etc/nginx/sites-enabled/
#   3. sudo nginx -t && sudo systemctl reload nginx
#
# ============================================================

server {
    # --- リスン設定 ---
    listen 80;
    listen [::]:80;                  # IPv6 対応

    # --- ドメイン名 ---
    server_name mysite.example.com;

    # --- ドキュメントルート ---
    root /var/www/mysite;
    index index.html index.htm;

    # --- ログ ---
    access_log /var/log/nginx/mysite.access.log;
    error_log  /var/log/nginx/mysite.error.log;

    # --- 文字コード ---
    charset utf-8;

    # --- favicon / robots のログ抑制 ---
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
    location = /robots.txt {
        log_not_found off;
        access_log off;
    }

    # --- 静的ファイルのキャッシュ ---
    # CSS / JavaScript: 30日間
    location ~* \.(css|js)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 画像 / フォント: 1年間
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # --- メインの location ---
    location / {
        # ファイルが見つからなければ 404
        try_files $uri $uri/ =404;
    }

    # --- エラーページ ---
    error_page 404 /404.html;
    location = /404.html {
        internal;   # 直接アクセス不可（内部リダイレクトのみ）
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        internal;
    }
}
