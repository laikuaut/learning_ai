<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>01 はじめてのReact</title>
  <!--
    ========================================
    学べる内容:
    - JSXの基本構文
    - コンポーネントの作り方
    - propsの受け渡し
    - コンポーネントの組み合わせ

    実行方法:
    このHTMLファイルをブラウザで開くだけで動作します。
    ========================================
  -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', 'Hiragino Sans', sans-serif; background-color: #f5f5f5; color: #333; }
    .app { max-width: 800px; margin: 0 auto; padding: 20px; }
    .header { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 30px; border-radius: 12px; text-align: center; margin-bottom: 24px; }
    .header h1 { font-size: 28px; margin-bottom: 8px; }
    .header p { opacity: 0.9; }
    .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .card h2 { color: #667eea; margin-bottom: 12px; font-size: 20px; }
    .profile { display: flex; align-items: center; gap: 16px; }
    .avatar { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; }
    .profile-info h3 { font-size: 18px; margin-bottom: 4px; }
    .profile-info p { color: #666; font-size: 14px; }
    .skill-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .skill-tag { background: #e8eaf6; color: #3f51b5; padding: 4px 12px; border-radius: 16px; font-size: 13px; }
    .greeting { background: #e8f5e9; padding: 16px; border-radius: 8px; border-left: 4px solid #4caf50; margin-bottom: 16px; }
    .section-title { font-size: 18px; color: #555; margin: 24px 0 12px; padding-bottom: 8px; border-bottom: 2px solid #667eea; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // ========================================
    // コンポーネント = UIの部品
    // 関数として定義し、JSX（HTMLに似た構文）を返す
    // ========================================

    // 1. もっとも基本的なコンポーネント（propsなし）
    function Header() {
      return (
        <div className="header">
          <h1>はじめてのReact</h1>
          <p>コンポーネントとJSXを学ぼう</p>
        </div>
      );
    }

    // 2. propsを受け取るコンポーネント
    // propsは親コンポーネントからデータを受け渡す仕組み
    function Greeting({ name, time }) {
      // JSX内で {} を使うとJavaScriptの式を埋め込める
      return (
        <div className="greeting">
          <p>{time}、<strong>{name}</strong>さん！Reactの世界へようこそ！</p>
        </div>
      );
    }

    // 3. 配列をpropsで受け取り、リスト表示するコンポーネント
    function ProfileCard({ name, role, emoji, bgColor, skills }) {
      return (
        <div className="card">
          <div className="profile">
            <div className="avatar" style={{ backgroundColor: bgColor }}>
              {emoji}
            </div>
            <div className="profile-info">
              <h3>{name}</h3>
              <p>{role}</p>
            </div>
          </div>
          {/* skills配列をmapで変換してリスト表示 */}
          <div className="skill-list">
            {skills.map((skill, index) => (
              <span key={index} className="skill-tag">{skill}</span>
            ))}
          </div>
        </div>
      );
    }

    // 4. childrenを受け取るコンポーネント（ラッパー）
    function Section({ title, children }) {
      return (
        <div>
          <h2 className="section-title">{title}</h2>
          {children}
        </div>
      );
    }

    // 5. 条件に応じて表示を変えるコンポーネント
    function StatusBadge({ isOnline }) {
      return (
        <span style={{
          display: 'inline-block',
          padding: '4px 12px',
          borderRadius: '12px',
          fontSize: '13px',
          backgroundColor: isOnline ? '#e8f5e9' : '#ffebee',
          color: isOnline ? '#2e7d32' : '#c62828',
        }}>
          {isOnline ? 'オンライン' : 'オフライン'}
        </span>
      );
    }

    // ========================================
    // メインのAppコンポーネント
    // 小さなコンポーネントを組み合わせてUIを構築する
    // ========================================
    function App() {
      // 現在の時間帯に応じた挨拶
      const hour = new Date().getHours();
      const timeGreeting = hour < 12 ? 'おはようございます' : hour < 18 ? 'こんにちは' : 'こんばんは';

      // データ（実際のアプリではAPIから取得することが多い）
      const members = [
        {
          name: '田中太郎',
          role: 'フロントエンドエンジニア',
          emoji: '👨‍💻',
          bgColor: '#e3f2fd',
          skills: ['React', 'TypeScript', 'Next.js'],
          isOnline: true,
        },
        {
          name: '鈴木花子',
          role: 'UIデザイナー',
          emoji: '🎨',
          bgColor: '#fce4ec',
          skills: ['Figma', 'CSS', 'UI設計'],
          isOnline: true,
        },
        {
          name: '佐藤次郎',
          role: 'バックエンドエンジニア',
          emoji: '⚙️',
          bgColor: '#e8f5e9',
          skills: ['Node.js', 'Python', 'AWS'],
          isOnline: false,
        },
      ];

      return (
        <div className="app">
          {/* コンポーネントを組み合わせてUIを構築 */}
          <Header />

          <Greeting name="学習者" time={timeGreeting} />

          <Section title="チームメンバー">
            {members.map((member, index) => (
              <div key={index} style={{ position: 'relative' }}>
                <div style={{ position: 'absolute', top: '20px', right: '20px' }}>
                  <StatusBadge isOnline={member.isOnline} />
                </div>
                <ProfileCard
                  name={member.name}
                  role={member.role}
                  emoji={member.emoji}
                  bgColor={member.bgColor}
                  skills={member.skills}
                />
              </div>
            ))}
          </Section>

          <Section title="JSXのポイント">
            <div className="card">
              <ul style={{ paddingLeft: '20px', lineHeight: '2' }}>
                <li><code>className</code> を使う（<code>class</code> ではない）</li>
                <li><code>{'{ }'}</code> でJavaScriptの式を埋め込める</li>
                <li>コンポーネント名は<strong>大文字</strong>で始める</li>
                <li><code>style</code> はオブジェクトで渡す（<code>{'{{ color: "red" }}'}</code>）</li>
                <li>リストには <code>key</code> を付ける</li>
              </ul>
            </div>
          </Section>
        </div>
      );
    }

    // Reactアプリをレンダリング
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
