<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APIデータ取得</title>
  <!--
    ==============================
    APIデータ取得（ユーザー検索アプリ）
    第10章・第11章の総合サンプル
    ==============================
    学べる内容:
      - fetch API によるHTTPリクエスト
      - async/await（非同期処理）
      - Promise.all による並行処理
      - try...catch によるエラーハンドリング
      - ローディング状態の管理
      - DOM操作による動的コンテンツ生成
    実行方法:
      ブラウザでこのファイルを開くだけで動作します
      ※ インターネット接続が必要です（JSONPlaceholder APIを使用）
    ==============================
  -->
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
      background: #f0f2f5;
      padding: 20px;
      color: #333;
    }
    .container { max-width: 800px; margin: 0 auto; }
    h1 {
      text-align: center;
      color: #2c3e50;
      margin-bottom: 8px;
    }
    .subtitle {
      text-align: center;
      color: #7f8c8d;
      font-size: 0.9rem;
      margin-bottom: 24px;
    }
    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: #3498db; color: white; }
    .btn-primary:hover:not(:disabled) { background: #2980b9; }
    .btn-success { background: #27ae60; color: white; }
    .btn-success:hover:not(:disabled) { background: #219653; }
    .btn-warning { background: #f39c12; color: white; }
    .btn-warning:hover:not(:disabled) { background: #e67e22; }
    .btn-danger { background: #e74c3c; color: white; }
    .btn-danger:hover:not(:disabled) { background: #c0392b; }
    .search-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .search-bar input {
      flex: 1;
      padding: 10px 16px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
    }
    .search-bar input:focus {
      outline: none;
      border-color: #3498db;
    }
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: white;
      border-radius: 8px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      font-size: 0.9rem;
    }
    .status-indicator {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    .dot-green { background: #27ae60; }
    .dot-red { background: #e74c3c; }
    .dot-yellow { background: #f39c12; animation: pulse 1s infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 16px; }
    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      transition: transform 0.2s;
    }
    .card:hover { transform: translateY(-2px); }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .card-name {
      font-size: 1.2rem;
      font-weight: bold;
      color: #2c3e50;
    }
    .card-id {
      background: #ecf0f1;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 0.8rem;
      color: #7f8c8d;
    }
    .card-info {
      font-size: 0.9rem;
      color: #555;
      line-height: 1.7;
    }
    .card-info .label {
      color: #7f8c8d;
      display: inline-block;
      min-width: 80px;
    }
    .card-posts {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #eee;
    }
    .card-posts .post-title {
      font-size: 0.85rem;
      color: #3498db;
      padding: 4px 0;
      cursor: default;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #7f8c8d;
    }
    .loading-spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid #ecf0f1;
      border-top-color: #3498db;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg {
      background: #ffeaea;
      border: 1px solid #e74c3c;
      border-radius: 8px;
      padding: 16px;
      color: #c0392b;
      text-align: center;
    }
    .timing {
      font-size: 0.8rem;
      color: #bbb;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>API データ取得</h1>
    <p class="subtitle">JSONPlaceholder API からユーザー情報を取得・表示します</p>

    <div class="controls">
      <button class="btn btn-primary" id="fetchUsersBtn">ユーザー一覧を取得</button>
      <button class="btn btn-success" id="fetchAllBtn">全データを並行取得</button>
      <button class="btn btn-warning" id="fetchErrorBtn">エラーテスト</button>
      <button class="btn btn-danger" id="clearBtn">クリア</button>
    </div>

    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="ユーザー名で検索..." disabled>
    </div>

    <div class="status-bar">
      <div class="status-indicator">
        <span class="dot dot-green" id="statusDot"></span>
        <span id="statusText">準備完了</span>
      </div>
      <span class="timing" id="timingText"></span>
    </div>

    <div id="content"></div>
  </div>

  <script>
    // --- API のベースURL ---
    const API_BASE = "https://jsonplaceholder.typicode.com";

    // --- DOM要素 ---
    const content = document.getElementById("content");
    const statusDot = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");
    const timingText = document.getElementById("timingText");
    const searchInput = document.getElementById("searchInput");

    // --- データの保持 ---
    let usersData = [];

    // --- ステータス表示の更新 ---
    function setStatus(type, message) {
      statusText.textContent = message;
      statusDot.className = "dot";
      switch (type) {
        case "loading":
          statusDot.classList.add("dot-yellow");
          break;
        case "success":
          statusDot.classList.add("dot-green");
          break;
        case "error":
          statusDot.classList.add("dot-red");
          break;
      }
    }

    // --- ローディング表示 ---
    function showLoading(message = "データを読み込んでいます...") {
      content.innerHTML = `
        <div class="loading">
          <div class="loading-spinner"></div>
          <div>${message}</div>
        </div>
      `;
    }

    // --- エラー表示 ---
    function showError(message) {
      content.innerHTML = `<div class="error-msg">${message}</div>`;
    }

    // --- ユーザーカードを生成 ---
    function createUserCard(user, posts = []) {
      const card = document.createElement("div");
      card.className = "card";

      let postsHtml = "";
      if (posts.length > 0) {
        const postItems = posts.slice(0, 3).map(p =>
          `<div class="post-title">${p.title}</div>`
        ).join("");
        postsHtml = `
          <div class="card-posts">
            <div style="font-size:0.8rem; color:#7f8c8d; margin-bottom:4px;">最新の投稿:</div>
            ${postItems}
            ${posts.length > 3 ? `<div style="font-size:0.8rem; color:#bbb;">...他${posts.length - 3}件</div>` : ""}
          </div>
        `;
      }

      card.innerHTML = `
        <div class="card-header">
          <span class="card-name">${user.name}</span>
          <span class="card-id">ID: ${user.id}</span>
        </div>
        <div class="card-info">
          <div><span class="label">ユーザー名:</span> ${user.username}</div>
          <div><span class="label">メール:</span> ${user.email}</div>
          <div><span class="label">電話:</span> ${user.phone}</div>
          <div><span class="label">都市:</span> ${user.address?.city ?? "不明"}</div>
          <div><span class="label">会社:</span> ${user.company?.name ?? "不明"}</div>
        </div>
        ${postsHtml}
      `;

      return card;
    }

    // --- ユーザーを表示 ---
    function renderUsers(users) {
      content.innerHTML = "";
      if (users.length === 0) {
        content.innerHTML = '<div class="loading">該当するユーザーが見つかりません</div>';
        return;
      }
      const grid = document.createElement("div");
      grid.className = "cards";
      users.forEach(({ user, posts }) => {
        grid.appendChild(createUserCard(user, posts));
      });
      content.appendChild(grid);
    }

    // --- fetch のラッパー関数（エラーハンドリング付き） ---
    async function fetchJSON(url) {
      const response = await fetch(url);
      if (!response.ok) {
        throw new Error(`HTTP Error: ${response.status} ${response.statusText}`);
      }
      return response.json();
    }

    // --- ユーザー一覧を取得（基本的なfetch） ---
    async function fetchUsers() {
      const startTime = performance.now();
      setStatus("loading", "ユーザーデータを取得中...");
      showLoading("ユーザーデータを取得しています...");

      try {
        const users = await fetchJSON(`${API_BASE}/users`);
        usersData = users.map(user => ({ user, posts: [] }));

        const elapsed = Math.round(performance.now() - startTime);
        setStatus("success", `${users.length}人のユーザーを取得しました`);
        timingText.textContent = `${elapsed}ms`;
        searchInput.disabled = false;

        renderUsers(usersData);
      } catch (error) {
        setStatus("error", "データの取得に失敗しました");
        showError(`エラー: ${error.message}`);
        timingText.textContent = "";
      }
    }

    // --- 全データを並行取得（Promise.all） ---
    async function fetchAllData() {
      const startTime = performance.now();
      setStatus("loading", "全データを並行取得中...");
      showLoading("ユーザー・投稿データを並行取得しています...");

      try {
        // Promise.all で並行リクエスト
        const [users, posts] = await Promise.all([
          fetchJSON(`${API_BASE}/users`),
          fetchJSON(`${API_BASE}/posts`)
        ]);

        // ユーザーごとに投稿を紐付け
        usersData = users.map(user => ({
          user,
          posts: posts.filter(post => post.userId === user.id)
        }));

        const elapsed = Math.round(performance.now() - startTime);
        setStatus("success",
          `${users.length}人のユーザーと${posts.length}件の投稿を取得しました`
        );
        timingText.textContent = `${elapsed}ms（並行取得）`;
        searchInput.disabled = false;

        renderUsers(usersData);
      } catch (error) {
        setStatus("error", "データの取得に失敗しました");
        showError(`エラー: ${error.message}`);
        timingText.textContent = "";
      }
    }

    // --- エラーテスト ---
    async function fetchWithError() {
      const startTime = performance.now();
      setStatus("loading", "エラーテスト中...");
      showLoading("存在しないURLにリクエストしています...");

      try {
        // 存在しないエンドポイントにアクセス
        await fetchJSON(`${API_BASE}/nonexistent-endpoint-12345`);
      } catch (error) {
        const elapsed = Math.round(performance.now() - startTime);
        setStatus("error", "予想通りエラーが発生しました");
        timingText.textContent = `${elapsed}ms`;
        showError(`
          <strong>エラーが正しくキャッチされました</strong><br><br>
          エラー内容: ${error.message}<br><br>
          <span style="font-size:0.85rem; color:#888;">
            これは try...catch によるエラーハンドリングのデモです。<br>
            存在しないAPIエンドポイントにリクエストし、エラーを捕捉しています。
          </span>
        `);
      }
    }

    // --- 検索フィルタ ---
    function filterUsers() {
      const query = searchInput.value.toLowerCase().trim();
      if (!query) {
        renderUsers(usersData);
        return;
      }

      const filtered = usersData.filter(({ user }) =>
        user.name.toLowerCase().includes(query) ||
        user.username.toLowerCase().includes(query) ||
        user.email.toLowerCase().includes(query)
      );

      renderUsers(filtered);
    }

    // --- イベント登録 ---
    document.getElementById("fetchUsersBtn").addEventListener("click", fetchUsers);
    document.getElementById("fetchAllBtn").addEventListener("click", fetchAllData);
    document.getElementById("fetchErrorBtn").addEventListener("click", fetchWithError);
    document.getElementById("clearBtn").addEventListener("click", () => {
      content.innerHTML = "";
      usersData = [];
      searchInput.value = "";
      searchInput.disabled = true;
      setStatus("success", "準備完了");
      timingText.textContent = "";
    });
    searchInput.addEventListener("input", filterUsers);
  </script>
</body>
</html>
