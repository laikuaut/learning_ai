# ============================================================
# nginx サンプル03：ロードバランサー設定
# ============================================================
#
# 学べる内容:
#   - upstream ブロックによるバックエンドグループ定義
#   - 分散アルゴリズム（round-robin, least_conn, ip_hash）
#   - 重み付け（weight）
#   - ヘルスチェック（max_fails, fail_timeout）
#   - バックアップサーバー
#
# 構成:
#   クライアント → nginx (LB) → app1:3000 / app2:3000 / app3:3000
#
# ============================================================

# --- バックエンドサーバーグループ ---
upstream app_servers {
    # 分散アルゴリズム（以下からひとつ選ぶ）
    # デフォルト: round-robin（順番に振り分け）

    # least_conn;    # 接続数が最も少ないサーバーに振り分け
    # ip_hash;       # クライアントIPでサーバーを固定（セッション維持）

    # --- メインサーバー ---
    server 10.0.1.1:3000 weight=3;           # 重み3（多く振り分ける）
    server 10.0.1.2:3000 weight=2;           # 重み2
    server 10.0.1.3:3000 weight=1;           # 重み1

    # --- ヘルスチェック ---
    # max_fails=3: 3回連続失敗でダウンとみなす
    # fail_timeout=30s: ダウンとみなしてから30秒後に再チェック
    server 10.0.1.4:3000 max_fails=3 fail_timeout=30s;

    # --- バックアップサーバー ---
    # メインサーバーがすべてダウンした場合のみ使用
    server 10.0.2.1:3000 backup;

    # --- Keep-Alive ---
    keepalive 32;
}

server {
    listen 80;
    server_name app.example.com;

    access_log /var/log/nginx/lb.access.log;
    error_log  /var/log/nginx/lb.error.log;

    location / {
        proxy_pass http://app_servers;

        # プロキシヘッダー
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep-Alive
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # どのバックエンドが応答したかをヘッダーで確認（デバッグ用）
        add_header X-Upstream-Addr $upstream_addr always;

        # バックエンド障害時の挙動
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 3;        # 最大3台まで試行
        proxy_next_upstream_timeout 10s;    # 試行全体のタイムアウト
    }

    # --- ヘルスチェック用 ---
    location = /health {
        proxy_pass http://app_servers;
        access_log off;
    }

    # --- nginx ステータス（監視用）---
    location = /nginx_status {
        stub_status;
        allow 10.0.0.0/8;
        deny all;
    }
}
