<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>03 コンポーネント分割</title>
  <!--
    ========================================
    学べる内容:
    - コンポーネントの定義と登録
    - props によるデータの受け渡し（親→子）
    - emit によるイベント通知（子→親）
    - 単方向データフロー

    実行方法:
    このHTMLファイルをブラウザで開くだけで動作します。
    ========================================
  -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', 'Hiragino Sans', sans-serif; background: #f0f2f5; }
    .app { max-width: 700px; margin: 0 auto; padding: 20px; }
    h1 { text-align: center; color: #35495e; margin-bottom: 24px; }
    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .product-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); transition: transform 0.2s, box-shadow 0.2s; }
    .product-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
    .product-image { height: 120px; display: flex; align-items: center; justify-content: center; font-size: 48px; }
    .product-info { padding: 16px; }
    .product-info h3 { font-size: 16px; margin-bottom: 4px; }
    .product-info .price { font-size: 20px; font-weight: bold; color: #e74c3c; }
    .product-info .category { font-size: 12px; color: #888; background: #f0f0f0; padding: 2px 8px; border-radius: 12px; display: inline-block; margin-bottom: 8px; }
    .add-btn { width: 100%; padding: 8px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; transition: all 0.2s; }
    .add-btn.in-cart { background: #e8f5e9; color: #2e7d32; }
    .add-btn.can-add { background: #42b883; color: white; }
    .add-btn.can-add:hover { background: #38a76d; }
    .cart-panel { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .cart-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
    .cart-item:last-child { border-bottom: none; }
    .qty-controls { display: flex; align-items: center; gap: 8px; }
    .qty-btn { width: 28px; height: 28px; border: 1px solid #ddd; border-radius: 50%; background: white; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
    .qty-btn:hover { background: #f0f0f0; }
    .remove-btn { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 13px; }
    .remove-btn:hover { text-decoration: underline; }
    .cart-total { display: flex; justify-content: space-between; padding-top: 16px; margin-top: 8px; border-top: 2px solid #333; font-size: 18px; font-weight: bold; }
    .empty-cart { text-align: center; padding: 24px; color: #999; }
    .star { cursor: pointer; font-size: 20px; transition: transform 0.1s; }
    .star:hover { transform: scale(1.2); }
    .rating-display { margin: 8px 0; }
  </style>
</head>
<body>
  <div id="app">
    <div class="app">
      <h1>コンポーネント分割デモ</h1>

      <!-- 商品一覧（ProductCard コンポーネントを使用） -->
      <h2 style="margin-bottom: 12px; color: #35495e;">商品一覧</h2>
      <div class="product-grid">
        <product-card
          v-for="product in products"
          :key="product.id"
          :product="product"
          :is-in-cart="isInCart(product.id)"
          @add-to-cart="addToCart"
        ></product-card>
      </div>

      <!-- カート（CartPanel コンポーネントを使用） -->
      <cart-panel
        :items="cartItems"
        @update-quantity="updateQuantity"
        @remove-item="removeFromCart"
      ></cart-panel>
    </div>
  </div>

  <script>
    const { createApp, ref, computed } = Vue

    // ========================================
    // 子コンポーネント 1: StarRating
    // props で値を受け取り、emit でイベントを親に通知
    // ========================================
    const StarRating = {
      props: {
        modelValue: { type: Number, default: 0 },
        readonly: { type: Boolean, default: false },
      },
      emits: ['update:modelValue'],
      setup(props, { emit }) {
        function setRating(n) {
          if (!props.readonly) {
            emit('update:modelValue', n)
          }
        }
        return { setRating }
      },
      template: `
        <div class="rating-display">
          <span
            v-for="n in 5"
            :key="n"
            class="star"
            :style="{ color: n <= modelValue ? '#f6ad55' : '#ddd', cursor: readonly ? 'default' : 'pointer' }"
            @click="setRating(n)"
          >{{ n <= modelValue ? '★' : '☆' }}</span>
        </div>
      `
    }

    // ========================================
    // 子コンポーネント 2: ProductCard
    // props: product（商品データ）、isInCart（カートに入っているか）
    // emit: add-to-cart（カートに追加を通知）
    // ========================================
    const ProductCard = {
      components: { StarRating },
      props: {
        product: { type: Object, required: true },
        isInCart: { type: Boolean, default: false },
      },
      emits: ['add-to-cart'],
      setup(props, { emit }) {
        const rating = ref(props.product.rating || 0)

        function handleAdd() {
          if (!props.isInCart) {
            // emit で親に「カートに追加したい」ことを通知
            emit('add-to-cart', props.product.id)
          }
        }

        return { rating, handleAdd }
      },
      template: `
        <div class="product-card">
          <div class="product-image" :style="{ backgroundColor: product.color }">
            {{ product.emoji }}
          </div>
          <div class="product-info">
            <span class="category">{{ product.category }}</span>
            <h3>{{ product.name }}</h3>
            <star-rating v-model="rating" />
            <p class="price">¥{{ product.price.toLocaleString() }}</p>
            <button
              :class="['add-btn', isInCart ? 'in-cart' : 'can-add']"
              @click="handleAdd"
              :disabled="isInCart"
            >
              {{ isInCart ? 'カートに入っています' : 'カートに追加' }}
            </button>
          </div>
        </div>
      `
    }

    // ========================================
    // 子コンポーネント 3: CartPanel
    // props: items（カート内商品の配列）
    // emit: update-quantity, remove-item
    // ========================================
    const CartPanel = {
      props: {
        items: { type: Array, required: true },
      },
      emits: ['update-quantity', 'remove-item'],
      setup(props, { emit }) {
        const totalPrice = computed(() => {
          return props.items.reduce((sum, item) => sum + item.price * item.quantity, 0)
        })

        const totalItems = computed(() => {
          return props.items.reduce((sum, item) => sum + item.quantity, 0)
        })

        return { totalPrice, totalItems }
      },
      template: `
        <div class="cart-panel">
          <h2 style="margin-bottom: 16px; color: #35495e;">
            カート
            <span v-if="totalItems > 0" style="font-size: 14px; color: #888; font-weight: normal;">
              ({{ totalItems }}点)
            </span>
          </h2>

          <div v-if="items.length === 0" class="empty-cart">
            <p style="font-size: 32px; margin-bottom: 8px;">🛒</p>
            <p>カートは空です</p>
          </div>

          <template v-else>
            <div v-for="item in items" :key="item.id" class="cart-item">
              <div>
                <strong>{{ item.name }}</strong>
                <p style="color: #888; font-size: 13px;">¥{{ item.price.toLocaleString() }}</p>
              </div>
              <div class="qty-controls">
                <button class="qty-btn" @click="$emit('update-quantity', item.id, item.quantity - 1)">-</button>
                <span style="min-width: 24px; text-align: center;">{{ item.quantity }}</span>
                <button class="qty-btn" @click="$emit('update-quantity', item.id, item.quantity + 1)">+</button>
                <button class="remove-btn" @click="$emit('remove-item', item.id)">削除</button>
              </div>
            </div>

            <div class="cart-total">
              <span>合計</span>
              <span>¥{{ totalPrice.toLocaleString() }}</span>
            </div>
          </template>
        </div>
      `
    }

    // ========================================
    // 親コンポーネント（App）
    // データを一元管理し、子コンポーネントにpropsで渡す
    // 子からのemitを受け取ってデータを更新する
    // ========================================
    createApp({
      components: { ProductCard, CartPanel },
      setup() {
        const products = ref([
          { id: 1, name: 'Vue.js入門書', price: 2980, category: '書籍', emoji: '📘', color: '#e3f2fd', rating: 4 },
          { id: 2, name: 'TypeScriptガイド', price: 3480, category: '書籍', emoji: '📗', color: '#e8f5e9', rating: 5 },
          { id: 3, name: 'メカニカルキーボード', price: 15800, category: '周辺機器', emoji: '⌨️', color: '#fce4ec', rating: 3 },
          { id: 4, name: 'USBハブ', price: 2980, category: '周辺機器', emoji: '🔌', color: '#fff3e0', rating: 4 },
          { id: 5, name: 'モニターライト', price: 5980, category: '周辺機器', emoji: '💡', color: '#f3e5f5', rating: 4 },
          { id: 6, name: 'React実践ガイド', price: 3200, category: '書籍', emoji: '📕', color: '#e8eaf6', rating: 5 },
        ])

        const cart = ref([])

        // カート内商品の詳細情報を含む配列
        const cartItems = computed(() => {
          return cart.value.map(cartItem => {
            const product = products.value.find(p => p.id === cartItem.productId)
            return {
              id: cartItem.productId,
              name: product.name,
              price: product.price,
              quantity: cartItem.quantity,
            }
          })
        })

        function isInCart(productId) {
          return cart.value.some(item => item.productId === productId)
        }

        // 子コンポーネントからの emit を処理
        function addToCart(productId) {
          if (isInCart(productId)) return
          cart.value.push({ productId, quantity: 1 })
        }

        function updateQuantity(productId, newQuantity) {
          if (newQuantity <= 0) {
            removeFromCart(productId)
            return
          }
          const item = cart.value.find(i => i.productId === productId)
          if (item) item.quantity = newQuantity
        }

        function removeFromCart(productId) {
          cart.value = cart.value.filter(i => i.productId !== productId)
        }

        return {
          products, cartItems, isInCart,
          addToCart, updateQuantity, removeFromCart,
        }
      }
    }).mount('#app')
  </script>
</body>
</html>
