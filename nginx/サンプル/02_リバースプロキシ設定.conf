# ============================================================
# nginx サンプル02：リバースプロキシ設定（Node.js / Python アプリ向け）
# ============================================================
#
# 学べる内容:
#   - proxy_pass によるバックエンドへの転送
#   - プロキシヘッダーの設定
#   - WebSocket のプロキシ
#   - タイムアウト設定
#
# 構成:
#   クライアント → nginx (80/443) → アプリ (localhost:3000)
#
# ============================================================

# --- upstream 定義（バックエンドサーバー）---
upstream app_backend {
    server 127.0.0.1:3000;

    # Keep-Alive 接続を維持（パフォーマンス向上）
    keepalive 32;
}

server {
    listen 80;
    server_name app.example.com;

    access_log /var/log/nginx/app.access.log;
    error_log  /var/log/nginx/app.error.log;

    # --- 静的ファイルは nginx が直接配信 ---
    location /static/ {
        alias /var/www/app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # --- API へのプロキシ ---
    location /api/ {
        proxy_pass http://app_backend;

        # --- プロキシヘッダー ---
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep-Alive を upstream に伝える
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # --- タイムアウト設定 ---
        proxy_connect_timeout 60s;    # バックエンドへの接続タイムアウト
        proxy_send_timeout    60s;    # バックエンドへのリクエスト送信タイムアウト
        proxy_read_timeout    60s;    # バックエンドからのレスポンス読み取りタイムアウト

        # --- バッファリング ---
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
    }

    # --- WebSocket のプロキシ ---
    location /ws/ {
        proxy_pass http://app_backend;

        # WebSocket に必要なヘッダー
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # WebSocket はタイムアウトを長めに
        proxy_read_timeout 86400s;    # 24時間
        proxy_send_timeout 86400s;
    }

    # --- ヘルスチェック用エンドポイント ---
    location = /health {
        proxy_pass http://app_backend;
        access_log off;     # ヘルスチェックのログは不要
    }

    # --- その他すべてのリクエスト ---
    location / {
        proxy_pass http://app_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
