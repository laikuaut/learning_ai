# ============================================================
# nginx サンプル04：SSL/HTTPS 設定（Let's Encrypt対応）
# ============================================================
#
# 学べる内容:
#   - SSL証明書の設定
#   - HTTP → HTTPS リダイレクト
#   - SSL パラメータの最適化
#   - HSTS（HTTP Strict Transport Security）
#   - OCSP Stapling
#   - HTTP/2 の有効化
#
# 前提:
#   Let's Encrypt で証明書を取得済み
#   sudo certbot certonly --webroot -w /var/www/html \
#        -d example.com -d www.example.com
#
# ============================================================

# --- HTTP → HTTPS リダイレクト ---
server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;

    # Let's Encrypt の認証チャレンジ用
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # それ以外は HTTPS にリダイレクト
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- www → non-www リダイレクト（HTTPS）---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.example.com;

    ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

    return 301 https://example.com$request_uri;
}

# --- メインサーバー（HTTPS）---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name example.com;

    root /var/www/example.com;
    index index.html;

    # === SSL 証明書 ===
    ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

    # === SSL パラメータ（Mozilla Intermediate 準拠）===
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;    # TLS 1.3 ではクライアント優先が推奨
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    # === SSL セッション ===
    ssl_session_cache shared:SSL:10m;     # 10MB のセッションキャッシュ
    ssl_session_timeout 1d;               # セッションの有効期限: 1日
    ssl_session_tickets off;              # セッションチケットを無効化（PFS確保）

    # === OCSP Stapling ===
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/example.com/chain.pem;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # === セキュリティヘッダー ===
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # === ログ ===
    access_log /var/log/nginx/example.com.access.log;
    error_log  /var/log/nginx/example.com.error.log;

    # === コンテンツ配信 ===
    location / {
        try_files $uri $uri/ =404;
    }

    # 静的ファイルのキャッシュ
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
