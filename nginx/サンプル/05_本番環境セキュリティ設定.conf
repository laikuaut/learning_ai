# ============================================================
# nginx サンプル05：本番環境セキュリティ設定（総合テンプレート）
# ============================================================
#
# 学べる内容:
#   - セキュリティヘッダーの包括的な設定
#   - アクセス制御（IP制限、Basic認証）
#   - レートリミット
#   - 隠しファイルの保護
#   - リクエストサイズ制限
#   - 全設定を1ファイルに統合した本番テンプレート
#
# 構成:
#   React SPA（フロント）+ Node.js API（バックエンド）
#   Let's Encrypt SSL 証明書
#
# ============================================================

# === グローバル設定（http ブロック内に記述）===
# ※ 実際には nginx.conf 内の http ブロックに記述

# レートリミットゾーン
# limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
# limit_req_zone $binary_remote_addr zone=login:10m rate=1r/s;
# limit_req_zone $binary_remote_addr zone=api:10m rate=50r/s;
# limit_req_status 429;
# limit_conn_zone $binary_remote_addr zone=conn:10m;


# --- HTTP → HTTPS リダイレクト ---
server {
    listen 80;
    listen [::]:80;
    server_name app.example.com;

    # Let's Encrypt 認証用
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# --- メインサーバー ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.example.com;

    # ============================================
    # 基本設定
    # ============================================
    root /var/www/app/build;
    index index.html;
    charset utf-8;
    client_max_body_size 10m;

    # ログ（JSON形式）
    access_log /var/log/nginx/app.access.json;
    error_log  /var/log/nginx/app.error.log warn;

    # ============================================
    # SSL/TLS
    # ============================================
    ssl_certificate /etc/letsencrypt/live/app.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/app.example.com/chain.pem;
    resolver 8.8.8.8 8.8.4.4 valid=300s;

    # ============================================
    # セキュリティヘッダー
    # ============================================
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self';" always;

    # バージョン情報非表示
    server_tokens off;

    # ============================================
    # アクセス制御
    # ============================================

    # .well-known は許可（Let's Encrypt, Apple 等）
    location ^~ /.well-known/ {
        allow all;
        root /var/www/html;
    }

    # 隠しファイル（.git, .env, .htaccess 等）を拒否
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # バックアップ/設定ファイルを拒否
    location ~* \.(bak|config|sql|fla|psd|ini|log|sh|inc|swp|dist|env)$ {
        deny all;
        access_log off;
    }

    # favicon / robots のログ抑制
    location = /favicon.ico { log_not_found off; access_log off; }
    location = /robots.txt  { log_not_found off; access_log off; }

    # ============================================
    # 管理画面（IP制限 + Basic認証）
    # ============================================
    location /admin/ {
        allow 10.0.0.0/8;            # 社内ネットワーク
        allow 192.168.0.0/16;        # VPN
        deny all;

        auth_basic "Admin Area";
        auth_basic_user_file /etc/nginx/.htpasswd;

        try_files $uri $uri/ /index.html;
    }

    # ============================================
    # API プロキシ
    # ============================================

    # ログイン（厳しいレートリミット）
    location = /api/auth/login {
        limit_req zone=login burst=5;
        limit_conn conn 5;

        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API 全体
    location /api/ {
        limit_req zone=api burst=100 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # タイムアウト
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;
    }

    # WebSocket
    location /ws/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # ============================================
    # 静的ファイル
    # ============================================

    # CSS / JavaScript（30日キャッシュ）
    location ~* \.(css|js)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        # セキュリティヘッダーは location 内で再定義が必要
        add_header X-Content-Type-Options "nosniff" always;
    }

    # 画像 / フォント（1年キャッシュ）
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 365d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ============================================
    # SPA フォールバック（最後に配置）
    # ============================================
    location / {
        limit_req zone=general burst=50 nodelay;
        try_files $uri $uri/ /index.html;
    }
}
